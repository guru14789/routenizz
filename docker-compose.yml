# TNImpact — Full Stack Docker Compose
# Usage:
#   docker compose up --build          # Start all services
#   docker compose up backend          # Start only the FastAPI backend
#   docker compose logs -f backend     # Stream backend logs
#
# Environment:
#   Copy .env.example → .env and fill in your values before running.

version: "3.9"

services:

  # ── 1. FastAPI ML Backend ────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tnimpact_backend
    ports:
      - "8001:8000" # Host 8001 → Container 8000 (matches VITE_API_BASE_URL)
    env_file:
      - .env
    volumes:
      - ./ml_models:/app/ml_models:ro # Mount trained model (read-only)
      - ./app.log:/app/app.log # Persist logs on host
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── 2. Vite React Frontend ───────────────────────────────────────────────────
  frontend:
    image: node:20-alpine
    container_name: tnimpact_frontend
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    env_file:
      - .env
    volumes:
      - .:/app
      - /app/node_modules # Prevent host node_modules from leaking in
    depends_on:
      - backend
    restart: unless-stopped
