# TNImpact — Full Stack Docker Compose
# Usage:
#   docker compose up --build          # Start all services
#   docker compose up backend          # Start only the FastAPI backend
#   docker compose logs -f backend     # Stream backend logs
#
# Environment:
#   Copy .env.example → .env and fill in your values before running.

version: "3.9"

services:

  # ── 1. FastAPI ML Backend ────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tnimpact_backend
    ports:
      - "8001:8000"
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./ml_models:/app/ml_models:ro
      - ./app.log:/app/app.log
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── 2. Celery Worker ────────────────────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tnimpact_worker
    command: celery -A app.celery_worker.celery_app worker --loglevel=info
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - .:/app
    restart: unless-stopped

  # ── 3. Redis (Broker & Result Backend) ───────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: tnimpact_redis
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── 4. Vite React Frontend ───────────────────────────────────────────────────
  frontend:
    image: node:20-alpine
    container_name: tnimpact_frontend
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    env_file:
      - .env
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      - backend
    restart: unless-stopped
