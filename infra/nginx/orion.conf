# ORION-ELITE Nginx Site Config
# Routes: /api/* → FastAPI backend | /* → React frontend
# SSE: X-Accel-Buffering disabled for live event streams

upstream backend_pool {
    server backend:8000;
    keepalive 32;
}

upstream frontend_pool {
    server frontend:5173;
}

server {
    listen 80;
    server_name _;

    # ── API Gateway: Backend ──────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://backend_pool;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Connection "";

        # Rate limiting
        limit_req zone=api_limit burst=20 nodelay;

        # Timeouts (long for VRP solves)
        proxy_connect_timeout 10s;
        proxy_read_timeout 120s;
        proxy_send_timeout 30s;
    }

    # ── SSE Live Events: Disable buffering ───────────────────────────────────
    location /api/v1/tasks/live-events {
        proxy_pass http://backend_pool;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Connection "";

        # Critical: SSE requires buffering OFF
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;   # 1-hour SSE connection
        add_header X-Accel-Buffering "no";
        add_header Cache-Control "no-cache";
    }

    # ── Health Check Passthrough ──────────────────────────────────────────────
    location /health {
        proxy_pass http://backend_pool/health;
        proxy_http_version 1.1;
        access_log off;
    }

    # ── Metrics: Prometheus scrape ────────────────────────────────────────────
    location /metrics {
        proxy_pass http://backend_pool/metrics;
        # Restrict access: only from internal monitoring network
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;
    }

    # ── React SPA: All other requests ─────────────────────────────────────────
    location / {
        proxy_pass http://frontend_pool;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;

        # Vite HMR WebSocket
        proxy_read_timeout 86400s;
    }
}

# Rate limiting zone definition (must be in http block — included via nginx.conf)
# limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
